<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}FitConnect{% endblock %}</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; color: #222; }
        header { background: #0d6efd; color: white; padding: 0.75rem 1.25rem; }
        header a { color: white; text-decoration: none; margin-right: 1rem; }
        header .brand { font-weight: 700; font-size: 1.15rem; }
        main { max-width: 800px; margin: 1.5rem auto; padding: 0 1rem; }
        .messages { list-style: none; padding: 0; }
        .messages li { padding: 0.5rem 0.75rem; border-radius: 4px; margin-bottom: 0.5rem; background: #e7f1ff; }
    </style>
</head>
<body>
    <header>
        <a class="brand" href="{% url 'accounts:home' %}">FitConnect</a>
        {% if user.is_authenticated %}
            <span style="float: right;">
                <a href="{% url 'accounts:profile' %}">Hi, {{ user.username }}</a>
                <form action="{% url 'logout' %}" method="post" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" style="background: none; border: none; color: white; cursor: pointer;">Log out</button>
                </form>
            </span>
        {% else %}
            <span style="float: right;">
                <a href="{% url 'login' %}">Log in</a>
                <a href="{% url 'accounts:register' %}">Sign up</a>
            </span>
        {% endif %}
    </header>
    <main>
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
