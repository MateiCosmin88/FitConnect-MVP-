{% extends 'base.html' %}

{% block title %}Log in – FitConnect{% endblock %}

{% block content %}
    <h1>Log in</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Log in</button>
    </form>
    <p><a href="{% url 'accounts:register' %}">Need an account? Sign up</a></p>
{% endblock %}
