{% extends 'base.html' %}

{% block title %}Log in – FitConnect{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-5">
            <h1 class="h3 mb-4">Log in</h1>
            {% if form.errors %}
                <div class="alert alert-danger">Username or password not recognised.</div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label" for="id_username">Username</label>
                    <input type="text" name="username" id="id_username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="id_password">Password</label>
                    <input type="password" name="password" id="id_password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary">Log in</button>
            </form>
            <p class="mt-3"><a href="{% url 'accounts:register' %}">Need an account? Sign up</a></p>
        </div>
    </div>
{% endblock %}
