{% extends 'base.html' %}

{% block title %}Delete event – FitConnect{% endblock %}

{% block content %}
    <h1>Delete "{{ event.title }}"?</h1>
    <p>This cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, delete</button>
        <a href="{% url 'events:detail' event.pk %}">Cancel</a>
    </form>
{% endblock %}
