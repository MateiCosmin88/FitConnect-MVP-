# FitConnect production compose stack.
# Bring up with:   docker compose up -d --build
# Reachable on:    http://<lxc-ip>/  (nginx serves on port 80)
services:
  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - fitconnect_data:/app/data
      - fitconnect_static:/app/staticfiles
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/').status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - fitconnect_static:/app/staticfiles:ro

volumes:
  fitconnect_data:
  fitconnect_static:
